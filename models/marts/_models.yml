version: 2

models:
  - name: metricflow_time_spine
    description: MetricFlow time spine — wraps dim_date for semantic layer queries.
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        granularity: day

  - name: dim_date
    config:
      meta:
        tier: mart
        owner: mark
    description: >
      Date spine from 2011-01-01 to 2023-12-31, one row per calendar day.
      Generated via BigQuery GENERATE_DATE_ARRAY — no dbt-utils dependency.
    columns:
      - name: date_day
        description: Calendar date — primary key and FK target for fact tables.
        tests:
          - not_null
          - unique

  - name: dim_company
    config:
      meta:
        tier: mart
        owner: mark
        portfolio_priority: high
    description: >
      One row per canonical company in the crosswalk (~30 entities after deduplication).
      Grain is canonical_name — multiple raw CFPB name variants and pre-merger rebrand
      rows collapse to a single dim row. Temporal stats (first/last seen, volume) are
      computed from fct_complaints and reflect all complaint eras for that canonical entity.
    columns:
      - name: company_sk
        description: Surrogate key — FARM_FINGERPRINT(canonical_name).
        tests:
          - not_null
          - unique
      - name: canonical_name
        description: Human-readable company name from the crosswalk seed.
        tests:
          - not_null
          - unique
      - name: category
        description: >
          Company type: bank, credit_bureau, credit_union, debt_collector,
          mortgage_servicer, student_loan_servicer, fintech, or other.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [bank, credit_bureau, credit_union, debt_collector,
                         mortgage_servicer, student_loan_servicer, fintech, other]
      - name: is_credit_bureau
        description: TRUE for Equifax, TransUnion, Experian, LexisNexis.
      - name: fdic_top_holder
        description: >
          FDIC top_holder key for the current entity. Populated for bank rows only.
          Pre-merger rebrand rows (SunTrust, BB&T) carry historically-correct
          top_holders that no longer appear in the active FDIC snapshot — see DECISIONS.md.
      - name: first_seen_date
        description: Earliest date_received across all complaints for this canonical company.
      - name: last_seen_date
        description: Latest date_received across all complaints for this canonical company.
      - name: total_complaint_volume
        description: Total complaint count across all crosswalked raw name variants.

  - name: mart_bank_complaints_monthly
    config:
      meta:
        tier: mart
        owner: mark
        portfolio_priority: high
    description: >
      Time-series companion to mart_bank_complaint_metrics. Grain:
      canonical_name × month_start × product_category (~17.5K rows across the same
      23-bank universe — Barclays excluded, no asset denominator). Bank attributes
      (size bucket, branchless flag, primary specialization, total assets,
      CFPB-supervised flag) are denormalized for BI ergonomics.

      Measures store COMPONENTS, not rates: complaint_count, timely_response_count,
      routed_same_day_count, sum_days_to_company, era-gated denominators
      (complaint_count_dispute_era, complaint_count_narrative_era), and era-gated
      numerators (disputed_count, narrative_count). Rates are derived at
      consumption time — sum the components and divide. This is the
      Simpson's-paradox-safe pattern: averaging stored monthly rates does not
      produce the correct rate of the summed components, but summing components
      and dividing does. Era-gated numerators are NULL (not zero) for cells with
      no in-era complaints; the rate is undefined, not zero.

      Use mart_bank_complaint_metrics for the executive bank-grain summary
      (percentile ranks, complaints_per_billion_assets) — its grain is the right
      one for cross-bank ranking. Use this mart for time-series, product-cut, or
      time × product cuts on the same universe.
    columns:
      - name: company_sk
        description: Surrogate key from dim_bank — FK to fct_complaints.company_sk and dim_company.company_sk.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_bank')
                field: company_sk
      - name: canonical_name
        description: Bank canonical name from the crosswalk. Repeats across months and product categories.
        tests:
          - not_null
      - name: month_start
        description: First day of the calendar month — DATE_TRUNC(date_received, MONTH). FK to dim_date.date_day for the month-start row.
        tests:
          - not_null
      - name: product_category
        description: >
          Seven-bucket product roll-up from fct_complaints: mortgage, credit_reporting,
          debt_collection, banking, card, payments, other. See fct_complaints YAML for
          the bucketing rationale.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [mortgage, credit_reporting, debt_collection, banking, card, payments, other]
      - name: bank_size_bucket
        description: Asset-tier label passed through from dim_bank — mega/large/mid/smaller. Identical across all rows for a given canonical_name.
      - name: bank_size_rank
        description: Ordinal for bank_size_bucket — 1=smaller, 2=mid, 3=large, 4=mega.
      - name: is_branchless
        description: TRUE if the bank's offices_count < 50. Pass-through from dim_bank.
      - name: primary_specialization
        description: FDIC specialization label from the largest-assets charter under this holder. Pass-through from dim_bank.
      - name: total_assets_billions
        description: Bank total assets in billions USD. Identical across all rows for a given canonical_name in this frozen-source build.
      - name: is_supervised_cfpb
        description: TRUE if any charter under this bank's holder is CFPB-supervised. Pass-through from dim_bank.

      - name: complaint_count
        description: Total complaints for this bank × month × product cell.
        tests:
          - not_null
      - name: timely_response_count
        description: Complaints in this cell with timely_response = TRUE. Numerator for timely_response_rate.
      - name: routed_same_day_count
        description: Complaints in this cell with days_to_company = 0. Numerator for pct_routed_same_day.
      - name: sum_days_to_company
        description: >
          Sum of days_to_company across complaints in this cell. Stored as a
          component so analysts can derive avg_days_to_company at any rollup
          (sum / complaint_count) — averaging monthly averages does not produce
          the correct overall average.

      - name: complaint_count_dispute_era
        description: >
          Number of complaints in this cell with is_dispute_era = TRUE
          (date_received < 2017-04-24). Denominator for dispute_rate.
          Cells in April 2017 split across the cutoff, so this is a per-cell
          count rather than a derived month-level boolean.
      - name: complaint_count_narrative_era
        description: >
          Number of complaints in this cell with is_narrative_era = TRUE
          (date_received >= 2015-06-01). Denominator for narrative_rate.

      - name: disputed_count
        description: >
          Number of in-dispute-era complaints in this cell where the consumer
          disputed the response. NULL when complaint_count_dispute_era = 0
          (rate is undefined, not zero). Numerator for dispute_rate.
      - name: narrative_count
        description: >
          Number of in-narrative-era complaints in this cell with a consumer
          narrative attached. NULL when complaint_count_narrative_era = 0.
          Numerator for narrative_rate.

  - name: mart_bank_complaint_metrics
    config:
      meta:
        tier: mart
        owner: mark
        portfolio_priority: high
    description: >
      One row per crosswalk bank with FDIC enrichment (~23 rows; Barclays excluded —
      no asset denominator). Joins fct_complaints → dim_bank directly on company_sk.
      Combines scale-normalized complaint volume (complaints_per_billion_assets) with
      routing speed and response quality metrics. bank_size_bucket is a dimension column
      for slicing — GROUP BY bank_size_bucket on this mart for tier-level rollups.
      Key finding: complaints_per_billion_assets ranges from ~8 (Goldman Sachs) to ~487
      (Synchrony). Credit-card monolines and branchless institutions structurally generate
      more complaints per asset dollar than traditional deposit banks — use primary_specialization
      and is_branchless to segment before cross-bank comparisons.
    columns:
      - name: company_sk
        description: Surrogate key from dim_bank. Carried through so MetricFlow's bank-grain semantic model can share the `company` entity with the complaints semantic model.
        tests:
          - not_null
          - unique
      - name: canonical_name
        description: Canonical bank name from the crosswalk.
        tests:
          - not_null
          - unique
      - name: top_holder_normalized
        description: Display-normalized FDIC holding company name.
      - name: bank_size_bucket
        description: >
          Asset-tier label: mega (>$1T), large ($400B-$1T), mid ($175B-$400B), smaller (<$175B).
          Dimension column for slicing — not the grain of this mart.
      - name: total_assets_billions
        description: Total assets in billions USD.
      - name: charter_count
        description: Number of FDIC-chartered subsidiaries under this holding company.
      - name: is_supervised_cfpb
        description: TRUE if any charter under this bank's holder is CFPB-supervised.
      - name: avg_roa
        description: Average return on assets (annualized FLOAT64).
      - name: complaint_count
        description: Total complaints for this bank across all crosswalked eras.
      - name: complaints_per_billion_assets
        description: >
          complaint_count divided by total_assets_billions. Controls for scale —
          enables fair comparison between a $3.4T bank and an $87B bank.
        tests:
          - not_null
      - name: first_complaint_date
        description: Earliest date_received across this bank's complaints. Useful for "is this bank's data current?" cuts.
      - name: last_complaint_date
        description: Latest date_received across this bank's complaints.
      - name: avg_days_to_company
        description: Mean CFPB routing speed in days (receipt to forwarding).
      - name: pct_routed_same_day
        description: >
          Share of complaints with days_to_company = 0 — the more decision-relevant
          cut on routing speed. Same-day routing is dominant 2015+ (75–92% across
          the dataset); avg_days_to_company is preserved alongside but lacks this
          denominator context.
      - name: timely_response_rate
        description: Share of complaints receiving a timely response.
      - name: dispute_rate
        description: >
          Consumer dispute rate restricted to is_dispute_era = true (pre-2017-04-24).
          Era-gating is encoded here; consumers need no knowledge of the policy cutoff.
      - name: narrative_rate
        description: >
          Share of complaints with consumer narrative attached, restricted to
          is_narrative_era = true (date_received >= 2015-06-01). Era-gated for the
          same reason as dispute_rate — pre-2015 narratives are structurally null.
      - name: offices_count
        description: Sum of branch/office counts across all FDIC charters under this holder.
      - name: is_branchless
        description: TRUE if offices_count < 50. Captures digital-only/card-focused banks.
      - name: deposits_to_assets_ratio
        description: sum(total_deposits) / sum(total_assets) — unit-free deposit funding ratio.
      - name: capital_ratio
        description: sum(equity_capital) / sum(total_assets) — unit-free balance sheet leverage.
      - name: avg_roe
        description: Average return on equity across all charters (FLOAT64, annualized percent).
      - name: credit_card_institution
        description: TRUE if any charter under this holder is classified as a credit-card institution.
      - name: primary_specialization
        description: FDIC specialization label from the largest-assets charter under this holder.
      - name: bank_size_rank
        description: Ordinal for bank_size_bucket — 1=smaller, 2=mid, 3=large, 4=mega.
      - name: roe_percentile_rank
        description: >
          PERCENT_RANK() of avg_roe within this 23-bank universe (Barclays excluded).
          0.0 = lowest ROE (HSBC at 2.77%), 1.0 = highest (American Express at 51.07%).
      - name: offices_count_percentile_rank
        description: >
          PERCENT_RANK() of offices_count within this 23-bank universe.
          0.0 = fewest offices (Ally at 1), 1.0 = most (JPMorgan at 5,029).

  - name: dim_bank
    config:
      meta:
        tier: mart
        owner: mark
        portfolio_priority: high
    description: >
      One row per crosswalk bank (24 rows). Enriches dim_company bank rows with FDIC
      holding-company attributes. Join fct_complaints → dim_bank on company_sk to add
      asset tier, ROA, and charter count to complaint-level analysis. 23 of 24 banks
      have FDIC enrichment; Barclays carries NULL FDIC columns (fdic_top_holder unresolved).
    columns:
      - name: company_sk
        description: >
          Surrogate key — FARM_FINGERPRINT(canonical_name). FK to fct_complaints.company_sk
          and dim_company.company_sk.
        tests:
          - not_null
          - unique
      - name: canonical_name
        description: Human-readable company name from the crosswalk.
        tests:
          - not_null
      - name: fdic_top_holder
        description: Raw FDIC top_holder join key. NULL for Barclays (unresolved enrichment gap).
      - name: top_holder_normalized
        description: Display-normalized top_holder for labels and charts.
      - name: charter_count
        description: Number of FDIC-chartered subsidiaries under this holding company.
      - name: total_assets_usd
        description: Sum of total_assets across all charters in USD (FDIC source is in thousands).
        tests:
          - not_null:
              config:
                where: "fdic_top_holder is not null"
      - name: bank_size_bucket
        description: >
          Asset-tier label calibrated to the crosswalk universe:
          mega (>$1T), large ($400B-$1T), mid ($175B-$400B), smaller (<$175B).
        tests:
          - not_null:
              config:
                where: "fdic_top_holder is not null"
          - accepted_values:
              arguments:
                values:
                  - "mega (>$1T)"
                  - "large ($400B-$1T)"
                  - "mid ($175B-$400B)"
                  - "smaller (<$175B)"
              config:
                where: "fdic_top_holder is not null"
      - name: is_supervised_cfpb
        description: TRUE if any charter under this holder is CFPB-supervised.
      - name: avg_roa
        description: Average return on assets across all charters (annualized FLOAT64).
      - name: offices_count
        description: Sum of branch/office counts across all FDIC charters under this holder.
      - name: is_branchless
        description: TRUE if offices_count < 50. Captures digital-only/card-focused banks.
      - name: deposits_to_assets_ratio
        description: sum(total_deposits) / sum(total_assets) — unit-free ratio measuring deposit funding reliance.
      - name: capital_ratio
        description: sum(equity_capital) / sum(total_assets) — unit-free leverage ratio.
      - name: avg_roe
        description: Average return on equity across all charters (FLOAT64, annualized percent).
      - name: credit_card_institution
        description: TRUE if any charter under this holder is classified as a credit-card institution.
      - name: primary_specialization
        description: FDIC specialization label from the largest-assets charter under this holder.
      - name: hq_state
        description: >
          Two-character USPS state code of the holding company HQ from FDIC's
          holding_company_state field. For multi-charter holders, the largest
          charter by assets wins (same tie-break used for primary_specialization).
          Nullable for crosswalk banks without FDIC enrichment.
      - name: total_complaint_volume
        description: Total complaint count from dim_company (all crosswalked eras).

  - name: fct_complaints
    config:
      meta:
        tier: mart
        owner: mark
        portfolio_priority: high
    description: >
      One row per CFPB complaint (2012–2022, ~3.4M rows). Product and issue
      columns carried directly — no dim join required. company_name_normalized
      is kept as a debug column alongside canonical_name and category from the
      crosswalk. company_sk enrichment deferred to Phase 2 (dim_company).
    columns:
      - name: complaint_id
        description: Natural primary key from CFPB.
        tests:
          - not_null
          - unique
      - name: product
        description: Raw product label from CFPB.
      - name: subproduct
        description: Raw subproduct label from CFPB. Nullable.
      - name: product_normalized
        description: >
          Legacy CFPB product labels mapped to current taxonomy via product_mapping seed.
          Consumer Loan split into Vehicle loan or lease vs. Payday loan, title loan, or personal loan
          based on subproduct.
      - name: product_category
        description: >
          Seven-bucket grouping of product_normalized: mortgage, credit_reporting,
          debt_collection, banking (checking/savings), card (credit card + prepaid),
          payments (money transfer/virtual currency), other (student loans, auto,
          payday, misc). Card is split from banking — complaint patterns and volumes
          differ significantly. Deliberate denormalization — dim_product was dropped
          since this single attribute doesn't justify a separate dim. See DECISIONS.md.
      - name: subproduct_normalized
        description: >
          Legacy subproduct labels mapped to current taxonomy via subproduct_mapping seed.
          Null-subproduct cases for legacy single-category products filled with best-fit current label.
      - name: issue
        description: Issue category. 165 distinct values.
      - name: subissue
        description: Subissue. Nullable; 20.2% null rate.
      - name: issue_category
        description: >
          Eight-bucket roll-up of the 165 raw issue values via the issue_mapping
          seed: credit_reporting, debt_collection, payment_servicing,
          account_management, transactions_fees, application_origination,
          fraud_identity_theft, other. Bucketing is semantic, not product-conditional —
          the same string maps to the same category regardless of product. Bank-segment
          distribution is well-spread across the top six buckets (no bucket >25%);
          full-dataset distribution is dominated by credit_reporting (~55%) due to
          credit-bureau volume.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - credit_reporting
                  - debt_collection
                  - payment_servicing
                  - account_management
                  - transactions_fees
                  - application_origination
                  - fraud_identity_theft
                  - other
      - name: company_sk
        description: >
          FK to dim_company. FARM_FINGERPRINT(canonical_name). NULL for the ~26%
          of complaints not matched by the crosswalk.
        tests:
          - relationships:
              arguments:
                to: ref('dim_company')
                field: company_sk
      - name: company_name_normalized
        description: >
          Uppercased, whitespace-collapsed, trailing-punct-stripped form of
          company_name. Kept as a debug column alongside canonical_name.
      - name: canonical_name
        description: >
          Human-readable company name from the crosswalk seed. Null for the ~26%
          of complaints that don't match a crosswalk entry.
      - name: category
        description: >
          Company type from crosswalk: bank, credit_bureau, credit_union,
          debt_collector, mortgage_servicer, student_loan_servicer, fintech, or
          other. Null for uncrosswalked complaints.
      - name: is_crosswalked
        description: >
          TRUE if this complaint's company_name_normalized matched a crosswalk
          entry. ~74% of complaints are crosswalked.

      - name: zip_code_is_valid
        description: >
          TRUE if zip_code matches r'^\d{5}$' after staging cleanup. FALSE for
          null zips, non-numeric values, and the 48 known corrupted zips. Note:
          CFPB intentional 3-digit privacy zips (low-ZCTA-population + narrative
          consent) incorrectly pass as TRUE after staging LPAD — see
          docs/data-quality-notes.md § ZIP Code.

      - name: tags_is_servicemember
        description: >
          TRUE if the complaint's tags field includes 'Servicemember'. Covers
          active duty, National Guard, Reservists, Veterans, retirees, and
          their spouses/dependents. FALSE for pre-Feb 2016 complaints
          (structurally null — CFPB added tags in Release 11) and for complaints
          with no servicemember tag. Gate analysis on date_received >= '2016-02-01'.
      - name: tags_is_older_american
        description: >
          TRUE if the complaint's tags field includes 'Older American' (age ≥ 62
          as reported by the submitter). FALSE for pre-Feb 2016 and untagged
          complaints. Same coverage floor as tags_is_servicemember.

      - name: is_dispute_era
        description: >
          TRUE for complaints received before 2017-04-24, the exact date CFPB
          discontinued the consumer_disputed field (Release 13). Gate any
          dispute-rate metric on this flag to avoid comparing full-coverage years
          against the post-discontinuation zero-fill period.
      - name: is_narrative_era
        description: >
          TRUE for complaints received on or after 2015-06-01, when CFPB launched
          the opt-in narrative feature. has_narrative is structurally FALSE before
          this date. Use as the floor for any narrative-rate metric.
      - name: days_to_company
        description: >
          Calendar days from date_received to date_sent_to_company, clamped to 0
          via GREATEST. Measures CFPB routing speed, not company resolution time.
          7,036 pre-2015 rows had a -1 day artifact (intake system clock issue);
          GREATEST clamps these to 0. Zero dominates 2015+ (75–92%) — reflects
          CFPB progressive automation of same-day forwarding, not a data artifact.
      - name: days_to_company_bucket
        description: >
          Coarse bucketing of days_to_company for distribution analysis:
          '0_same_day', '1_to_3', '4_to_14', '15_plus'. On-theme with the
          routing-speed story; share of '0_same_day' is the headline cut.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['0_same_day', '1_to_3', '4_to_14', '15_plus']
      - name: had_monetary_relief
        description: >
          TRUE iff company_response_to_consumer = 'Closed with monetary relief'.
          Common-filter convenience boolean. Legacy 'Closed with relief' (5K rows,
          pre-2013) is excluded — the label doesn't disambiguate monetary vs.
          non-monetary relief.
      - name: response_category
        description: >
          Three-bucket roll-up of company_response_to_consumer:
          'relief' (monetary, non-monetary, or legacy 'Closed with relief'),
          'explanation_only' (Closed with explanation, Closed without relief,
          terse 'Closed'), 'other' (Untimely response, In progress).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['relief', 'explanation_only', 'other']
