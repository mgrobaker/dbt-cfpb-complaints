version: 2

# MetricFlow semantic layer — defines measures and metrics as code.
# Closest dbt-native analog to LookML: metric definitions live here, not in the BI tool.
# BI tools and dbt sl query both resolve against these definitions.

semantic_models:
  - name: complaints
    description: >
      Fact table grain: one row per CFPB complaint (2012–2022). Primary time
      dimension is date_received. company entity joins to dim_company via company_sk.
    model: ref('fct_complaints')
    defaults:
      agg_time_dimension: date_received

    entities:
      - name: complaint
        type: primary
        expr: complaint_id
      - name: company
        type: foreign
        expr: company_sk

    dimensions:
      - name: date_received
        type: time
        type_params:
          time_granularity: day
      - name: product_normalized
        type: categorical
      - name: product_category
        type: categorical
      - name: state
        type: categorical
      - name: category
        type: categorical
      - name: is_crosswalked
        type: categorical
      - name: is_dispute_era
        type: categorical
        description: >
          TRUE for complaints before 2017-04-24. Gate dispute_rate on this
          dimension — post-era consumer_disputed is structurally null.
      - name: is_narrative_era
        type: categorical
        description: >
          TRUE for complaints on or after 2015-06-01. Gate narrative_rate on
          this dimension — pre-era has_narrative is structurally false.
      - name: submitted_via
        type: categorical
      - name: timely_response
        type: categorical
      - name: has_narrative
        type: categorical
      - name: consumer_disputed
        type: categorical
      - name: tags_is_servicemember
        type: categorical
      - name: tags_is_older_american
        type: categorical

    measures:
      - name: complaint_count
        description: Count of complaints.
        agg: count
        expr: complaint_id

      - name: timely_response_count
        description: Count of complaints with a timely company response.
        agg: sum
        expr: "case when timely_response then 1 else 0 end"

      - name: disputed_count
        description: >
          Count of complaints where the consumer disputed the response.
          Only meaningful when filtered to is_dispute_era = true.
        agg: sum
        expr: "case when consumer_disputed then 1 else 0 end"

      - name: narrative_count
        description: >
          Count of complaints with an attached consumer narrative.
          Only meaningful when filtered to is_narrative_era = true.
        agg: sum
        expr: "case when has_narrative then 1 else 0 end"

      - name: avg_days_to_company
        description: >
          Average CFPB routing time from receipt to forwarding. Clamped to 0
          — the 7,036 pre-2015 -1-day intake artifacts are zeroed out.
        agg: average
        expr: days_to_company

  # ── Bank-grain semantic model ────────────────────────────────────────────────
  # Built on mart_bank_complaint_metrics (one row per crosswalk bank) rather than
  # dim_bank, because MetricFlow requires every measure to have an agg_time_dimension
  # and the metrics mart carries last_complaint_date as a natural time dimension.
  # Shares the `company` entity (canonical_name) with the complaints semantic model,
  # so complaints_per_billion_assets resolves via that entity at any rollup grain.
  - name: banks
    description: >
      One row per FDIC-enriched crosswalk bank (23). Provides the asset
      denominator for complaints_per_billion_assets and bank-level dimensions
      (size bucket, specialization, branchless flag) for cross-bank cuts.
    model: ref('mart_bank_complaint_metrics')
    defaults:
      agg_time_dimension: last_complaint_date

    entities:
      - name: company
        type: primary
        expr: company_sk

    dimensions:
      - name: last_complaint_date
        type: time
        type_params:
          time_granularity: day
      - name: bank_size_bucket
        type: categorical
      - name: is_branchless
        type: categorical
      - name: primary_specialization
        type: categorical
      - name: is_supervised_cfpb
        type: categorical
      - name: credit_card_institution
        type: categorical

    measures:
      - name: total_assets_billions
        description: >
          SUM of total_assets_billions across the rows in scope. The aggregation
          is sum, not average — at bank grain it reads as the bank's own asset
          size; at any rollup (e.g. by bank_size_bucket or primary_specialization)
          it returns the summed assets of all banks in that group, which is the
          right denominator for complaints_per_billion_assets at that grain.
          Excludes Barclays — already filtered out of mart_bank_complaint_metrics
          (no asset denominator).
        agg: sum
        expr: total_assets_billions


metrics:
  # ── Simple metrics (one per measure; also serve as ratio components) ──────────

  - name: complaint_count
    label: Total Complaints
    description: Count of all complaints in the dataset (2012–2022).
    type: simple
    type_params:
      measure:
        name: complaint_count

  - name: timely_response_count
    label: Timely Response Count
    description: Count of complaints with a timely company response.
    type: simple
    type_params:
      measure:
        name: timely_response_count

  - name: disputed_count
    label: Disputed Count
    description: >
      Count of complaints where the consumer disputed the response.
      Only meaningful when filtered to is_dispute_era = true.
    type: simple
    type_params:
      measure:
        name: disputed_count

  - name: narrative_count
    label: Narrative Count
    description: >
      Count of complaints with an attached consumer narrative.
      Only meaningful when filtered to is_narrative_era = true.
    type: simple
    type_params:
      measure:
        name: narrative_count

  - name: avg_days_to_company
    label: Avg Days to Company
    description: >
      Average calendar days from complaint receipt to CFPB forwarding to the
      company. Measures CFPB routing speed, not company resolution time.
      Zero dominates 2015+ (75–92%) as CFPB progressively automated same-day
      forwarding — low values reflect operational efficiency, not missing data.
    type: simple
    type_params:
      measure:
        name: avg_days_to_company

  # ── Ratio metrics ─────────────────────────────────────────────────────────────

  - name: timely_response_rate
    label: Timely Response Rate
    description: >
      Share of complaints where the company responded within the CFPB deadline.
      Universally high (>95% for top institutions) — most useful as a
      cross-company comparator, not an absolute signal.
    type: ratio
    type_params:
      numerator:
        name: timely_response_count
      denominator:
        name: complaint_count

  - name: dispute_rate
    label: Dispute Rate
    description: >
      Share of complaints where the consumer disputed the company's response.
      Filtered to is_dispute_era = true (pre-2017-04-24): CFPB discontinued
      the consumer_disputed field on that exact date (Release 13), so computing
      this metric across all years produces a meaningless denominator.
    type: ratio
    type_params:
      numerator:
        name: disputed_count
      denominator:
        name: complaint_count
    filter: "{{ Dimension('complaint__is_dispute_era') }} = true"

  - name: narrative_rate
    label: Narrative Rate
    description: >
      Share of complaints with a consumer narrative attached (opt-in).
      Filtered to is_narrative_era = true (on or after 2015-06-01): CFPB
      launched the narrative feature in that release; pre-era values are
      structurally false and would suppress the rate toward zero.
    type: ratio
    type_params:
      numerator:
        name: narrative_count
      denominator:
        name: complaint_count
    filter: "{{ Dimension('complaint__is_narrative_era') }} = true"

  # ── Bank-grain metrics ───────────────────────────────────────────────────────
  - name: total_assets_billions
    label: "Sum of Bank Assets ($B)"
    description: >
      Aggregation: SUM. At bank grain, reads as that bank's own asset size;
      at any rollup beyond a single bank (e.g. group by bank_size_bucket),
      reads as the summed assets of every bank in the group. Always a sum,
      never an average — the label and metric semantics make this explicit
      so consumers don't misread a tier-level value as a per-bank average.
    type: simple
    type_params:
      measure:
        name: total_assets_billions

  # ── Time-comparison metrics ──────────────────────────────────────────────────
  # Demonstrate metric_time / offset_window: each metric references complaint_count
  # twice — current period and a same-named offset alias — and the BI tool /
  # dbt sl query computes the ratio at whatever metric_time grain it asks for.

  - name: complaint_count_mom_pct_change
    label: Complaint Count MoM % Change
    description: >
      Month-over-month percentage change in complaint_count: (current − prior_month) / prior_month.
      Resolves at any time grain via metric_time; querying with metric_time__month
      gives a per-month series of MoM growth rates.
    type: derived
    type_params:
      expr: "(complaint_count - complaint_count_prior_month) / nullif(complaint_count_prior_month, 0)"
      metrics:
        - name: complaint_count
        - name: complaint_count
          offset_window: 1 month
          alias: complaint_count_prior_month

  - name: complaint_count_yoy_pct_change
    label: Complaint Count YoY % Change
    description: >
      Year-over-year percentage change in complaint_count: (current − prior_year) / prior_year.
      A more stable trend signal than MoM — smooths over the seasonal pattern visible
      in the monthly series. Same offset_window mechanic, longer window.
    type: derived
    type_params:
      expr: "(complaint_count - complaint_count_prior_year) / nullif(complaint_count_prior_year, 0)"
      metrics:
        - name: complaint_count
        - name: complaint_count
          offset_window: 1 year
          alias: complaint_count_prior_year

  # ── Derived: combines measures across the complaints and banks semantic models ──
  - name: complaints_per_billion_assets
    label: Complaints per $B Assets
    description: >
      Scale-normalized complaint volume — complaint_count / total_assets_billions.
      Joins the complaints semantic model (fct_complaints grain) and the banks
      semantic model (dim_bank grain) on the shared `company` entity. The
      headline finding of the project (range ~8 at Goldman to ~487 at Synchrony)
      now lives in the semantic layer, so any consumer (BI tool, dbt sl query)
      computes the same number at any cut — by bank, by bank_size_bucket, by
      primary_specialization — without re-deriving the ratio.
    type: derived
    type_params:
      expr: complaint_count / total_assets_billions
      metrics:
        - name: complaint_count
        - name: total_assets_billions
