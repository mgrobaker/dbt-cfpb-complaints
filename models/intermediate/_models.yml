version: 2

models:
  - name: int_fdic_banks_normalized
    description: >
      Aggregates stg_fdic_banks to top_holder grain and applies display normalization.
      One row per raw top_holder value. total_assets_usd converts FDIC thousands to USD.
      Join key to dim_company is raw top_holder (not the normalized display column).
    columns:
      - name: top_holder
        description: Raw FDIC top_holder string — primary join key to dim_company.fdic_top_holder.
        tests:
          - not_null
          - unique
      - name: top_holder_normalized
        description: >
          Display-only normalized name. Applies: whitespace collapse, '&' spacing,
          BCORP→BANCORP, FINL→FINANCIAL, trailing THE stripped.
        tests:
          - not_null
      - name: charter_count
        description: Number of FDIC-chartered subsidiary banks under this top holder.
        tests:
          - not_null
      - name: total_assets_usd
        description: >
          Sum of total_assets across all charters, converted to USD
          (FDIC source stores thousands; multiplied ×1000 here).
        tests:
          - not_null
      - name: is_supervised_cfpb
        description: TRUE if any charter under this holder is CFPB-supervised.
      - name: avg_roa
        description: Average return on assets across all charters (FLOAT64, annualized).
      - name: bank_size_bucket
        description: >
          Asset-tier label calibrated to the CFPB crosswalk universe (top complaint
          institutions): mega (>$1T), large ($400B-$1T), mid ($175B-$400B), smaller (<$175B).
          Tiers reflect natural breaks in this population, not industry-standard FDIC buckets.
        tests:
          - not_null

  - name: int_complaints_with_company
    description: >
      stg_cfpb_complaints left-joined to the company crosswalk on
      company_name_normalized. Adds canonical_name, category, and is_crosswalked
      to every complaint row. Grain: one row per complaint — the left join
      preserves all staging rows and raw_company_name is unique in
      stg_company_crosswalk, so no fan-out is possible.
      Reused by fct_complaints and any future company-level mart.
    columns:
      - name: complaint_id
        description: Natural primary key — carried from stg_cfpb_complaints.
        tests:
          - not_null
          - unique

      - name: canonical_name
        description: >
          Human-readable company name from the crosswalk (e.g. "JPMorgan Chase").
          Null for complaints whose company_name_normalized has no crosswalk entry
          (~23% of volume by design — long-tail companies are uncategorized).
      - name: category
        description: >
          Company type from the crosswalk: bank, credit_bureau, debt_collector,
          mortgage_servicer, student_loan_servicer, fintech, or other.
          Null for uncrosswalked complaints.
        tests:
          - accepted_values:
              arguments:
                values:
                  - bank
                  - credit_bureau
                  - credit_union
                  - debt_collector
                  - mortgage_servicer
                  - student_loan_servicer
                  - fintech
                  - other
              config:
                where: "is_crosswalked = true"
      - name: company_parent_as_of
        description: >
          Effective date of entity change for rebranded companies (SunTrust,
          BB&T, Alliance Data). Null for current or historically-stable entities.
      - name: is_crosswalked
        description: >
          TRUE if the complaint's company_name_normalized matched a crosswalk entry.
          FALSE for long-tail companies not in the seed. Crosswalk covers ~77% of
          complaint volume (top 3 credit bureaus + top 30 others).
        tests:
          - not_null
