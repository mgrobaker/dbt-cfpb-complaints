version: 2

models:
  - name: stg_cfpb_complaints
    description: >
      Staging pass over `raw.cfpb_complaints`. String columns trimmed; state uppercased.
      Excludes 2011 (stub year, 2,536 rows) and 2023 (partial year, frozen 2023-03-23).
      Effective date range: 2012-01-01 to 2022-12-31. One row per complaint.
    columns:
      - name: complaint_id
        description: Natural primary key from CFPB.
        tests:
          - not_null
          - unique

      - name: date_received
        description: Date CFPB received the complaint.
        tests:
          - not_null
      - name: date_sent_to_company
        description: >
          Date CFPB forwarded the complaint to the named company. 7,036 rows (~0.2%) have
          date_sent_to_company < date_received by exactly 1 day, all between 2012-01-22 and
          2014-04-26. Systematic intake-system artifact (timezone/batch-processing clock
          issue); rows are kept and assert_complaint_dates_ordered runs at severity: warn.
        tests:
          - not_null

      - name: product
        description: >
          Top-level product taxonomy (18 distinct values). accepted_values at severity: warn
          — values list written from general CFPB taxonomy knowledge, not verified against
          actual data. Promote to severity: error after running SELECT DISTINCT product.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "Bank account or service"
                  - "Checking or savings account"
                  - "Consumer Loan"
                  - "Credit card"
                  - "Credit card or prepaid card"
                  - "Credit reporting"
                  - "Credit reporting, credit repair services, or other personal consumer reports"
                  - "Debt collection"
                  - "Money transfer, virtual currency, or money service"
                  - "Money transfers"
                  - "Mortgage"
                  - "Other financial service"
                  - "Payday loan"
                  - "Payday loan, title loan, or personal loan"
                  - "Prepaid card"
                  - "Student loan"
                  - "Vehicle loan or lease"
                  - "Virtual currency"
              config:
                severity: warn
      - name: subproduct
        description: Product subcategory; ~7% null. Raw value from source — preserved for auditability.
      - name: product_normalized
        description: >
          product with legacy CFPB taxonomy merged into current labels. Eight old categories
          consolidated: Bank account or service → Checking or savings account; Consumer Loan →
          Vehicle loan or lease or Payday loan, title loan, or personal loan (by subproduct);
          Credit card → Credit card or prepaid card; Credit reporting → Credit reporting, credit
          repair services, or other personal consumer reports; Money transfers → Money transfer,
          virtual currency, or money service; Payday loan → Payday loan, title loan, or personal
          loan; Prepaid card → Credit card or prepaid card; Virtual currency → Money transfer,
          virtual currency, or money service. Unrecognized values pass through unchanged.
          not_null at severity: error — product is never null and the CASE has an ELSE branch,
          so a null here means broken logic.
        tests:
          - not_null
      - name: subproduct_normalized
        description: >
          subproduct with legacy labels merged into current equivalents, consistent with
          product_normalized. Key changes: Bank account or service subproduct label differences
          resolved; Consumer Loan vehicle subproducts renamed to Loan / Lease; legacy single-product
          null subproducts filled (Credit card → General-purpose credit card or charge card,
          Credit reporting → Credit reporting, Payday loan → Payday loan); Prepaid card
          subproducts mapped to Credit card or prepaid card equivalents; Debt collection
          old-style subproducts normalized (added "debt" suffix: Credit card → Credit card debt,
          Medical → Medical debt, etc.; Non-federal student loan → Private student loan debt).
          Unrecognized values pass through unchanged.
      - name: issue
        description: Top-level issue taxonomy (165 distinct values).
      - name: subissue
        description: Issue subcategory; ~20% null.

      - name: company_name
        description: >
          Free-text company name as submitted. 6,694 distinct values; parent
          corporations mixed with subsidiaries. Canonicalization happens
          downstream via crosswalk seed.
      - name: company_name_normalized
        description: >
          Derived from company_name: uppercased, internal whitespace collapsed
          to a single space, trailing period/comma/semicolon stripped. Used for
          grouping and crosswalk matching without altering the raw value.
      - name: state
        description: >
          2-char US state/territory/military code, uppercased. Null remapped to
          'not-provided'. "UNITED STATES MINOR OUTLYING ISLANDS" (305 rows) remapped
          to ISO code 'UM'. Any other long-form value remapped to 'not-provided' as a
          safety catch. Includes territories (PR, VI, GU, AS, MP, UM), military APO
          codes (AA, AE, AP), and freely associated states (FM, MH, PW).
          accepted_values at severity: error — values list confirmed against actual data
          (63 distinct raw values, all accounted for in the CASE expression or safety catch).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "AA"
                  - "AE"
                  - "AK"
                  - "AL"
                  - "AP"
                  - "AR"
                  - "AS"
                  - "AZ"
                  - "CA"
                  - "CO"
                  - "CT"
                  - "DC"
                  - "DE"
                  - "FL"
                  - "FM"
                  - "GA"
                  - "GU"
                  - "HI"
                  - "IA"
                  - "ID"
                  - "IL"
                  - "IN"
                  - "KS"
                  - "KY"
                  - "LA"
                  - "MA"
                  - "MD"
                  - "ME"
                  - "MH"
                  - "MI"
                  - "MN"
                  - "MO"
                  - "MP"
                  - "MS"
                  - "MT"
                  - "NC"
                  - "ND"
                  - "NE"
                  - "NH"
                  - "NJ"
                  - "NM"
                  - "NV"
                  - "NY"
                  - "OH"
                  - "OK"
                  - "OR"
                  - "PA"
                  - "PR"
                  - "PW"
                  - "RI"
                  - "SC"
                  - "SD"
                  - "TN"
                  - "TX"
                  - "UT"
                  - "VA"
                  - "VI"
                  - "VT"
                  - "WA"
                  - "WI"
                  - "WV"
                  - "WY"
                  - "UM"
                  - "not-provided"
              config:
                severity: error
      - name: zip_code
        description: 5-char ZIP; may be masked (XXXXX) for privacy.

      - name: tags
        description: Special-population tag (Older American, Servicemember). 89% null.
      - name: submitted_via
        description: >
          Intake channel (Web, Phone, Referral, etc.). accepted_values at severity: warn
          — values list unverified. Promote to severity: error after running
          SELECT DISTINCT submitted_via.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "Email"
                  - "Fax"
                  - "Phone"
                  - "Postal mail"
                  - "Referral"
                  - "Web"
                  - "Web Referral"
              config:
                severity: warn
      - name: company_response_to_consumer
        description: >
          Resolution category returned by the company. 4 null rows mapped to
          'Untimely response' (assumption: no response filed = untimely).
          not_null at severity: error — nulls coalesced away in staging.
        tests:
          - not_null
      - name: company_public_response
        description: >
          Optional public statement from the company. Null (56%) mapped to 'Unknown'.
          The verbose label "Company has responded to the consumer and the CFPB and
          chooses not to provide a public response" (1.3M rows) is collapsed to
          "Company chooses not to provide a public response" — the consumer response
          detail belongs in company_response_to_consumer, not here.
          not_null at severity: error — nulls mapped to 'Unknown' in staging.
        tests:
          - not_null
      - name: consumer_consent_provided
        description: >
          Whether the consumer consented to narrative publication. Null (25%) mapped
          to 'Unknown'. Values after staging: Consent provided, Consent not provided,
          Consent withdrawn, Other, Unknown.
          not_null at severity: error — nulls coalesced away in staging.
        tests:
          - not_null

      - name: timely_response
        description: Whether the company responded within CFPB's SLA.
        tests:
          - not_null
      - name: consumer_disputed
        description: >
          Legacy field. CFPB stopped collecting mid-2017: 100% fill through 2016,
          29.8% in 2017, 0% from 2018 onward — 78% null overall. Gate any
          dispute-rate metric on date_received < '2017-01-01' to avoid comparing
          full-coverage years against empty ones.
      - name: has_narrative
        description: >
          Derived at raw materialization: TRUE if the source row had a non-empty
          consumer_complaint_narrative (text dropped to reduce table size 2.31 GB →
          768 MB). Zero before June 2015 — CFPB launched the opt-in narrative feature
          then. The 2015 rate (32.5%) reflects a partial year; treat 2016 as the
          effective floor for narrative analysis.
          not_null at severity: error — derived boolean, always TRUE or FALSE.
        tests:
          - not_null

  - name: stg_fdic_banks
    description: >
      Thin staging pass over `raw.fdic_active_banks_lean`. Renames
      `fdic_certificate_number` → `fdic_cert`; trims identity/name text;
      uppercases state. One row per active FDIC-insured institution.
    columns:
      - name: fdic_cert
        description: FDIC certificate number — natural primary key.
        tests:
          - not_null
          - unique

      - name: institution_name
        description: Operating bank legal name (e.g. "JPMorgan Chase Bank, National Association").
      - name: top_holder
        description: >
          Parent holding company name (e.g. "JPMORGAN CHASE & CO."). Primary
          bridge to CFPB `company_name` for bank-side complaint volume.
      - name: trade_name_1
        description: DBA / trade name if different from legal name.

      - name: state
        description: 2-char US state code; uppercased.
      - name: cfpb_supervisory_flag
        description: Whether institution is under CFPB supervision.
      - name: total_assets
        description: Total assets in USD. Sort key for size-based cohorts.
      - name: active
        description: Always TRUE in this table (source pre-filtered to active institutions).
