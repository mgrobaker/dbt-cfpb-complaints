version: 2

models:
  - name: stg_cfpb_complaints
    description: >
      Staging pass over `raw.cfpb_complaints`. String columns trimmed; state uppercased.
      Excludes 2011 (stub year, 2,536 rows) and 2023 (partial year, frozen 2023-03-23).
      Effective date range: 2012-01-01 to 2022-12-31. One row per complaint.
    columns:
      - name: complaint_id
        description: Natural primary key from CFPB.
        tests:
          - not_null
          - unique

      - name: date_received
        description: Date CFPB received the complaint.
        tests:
          - not_null
      - name: date_sent_to_company
        description: >
          Date CFPB forwarded the complaint to the named company. 7,036 rows (~0.2%) have
          date_sent_to_company < date_received by exactly 1 day, all between 2012-01-22 and
          2014-04-26. Systematic intake-system artifact (timezone/batch-processing clock
          issue); rows are kept and assert_complaint_dates_ordered runs at severity: warn.
        tests:
          - not_null

      - name: product
        description: >
          Top-level product taxonomy (18 distinct values). accepted_values at severity: warn
          — values list written from general CFPB taxonomy knowledge, not verified against
          actual data. Promote to severity: error after running SELECT DISTINCT product.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "Bank account or service"
                  - "Checking or savings account"
                  - "Consumer Loan"
                  - "Credit card"
                  - "Credit card or prepaid card"
                  - "Credit reporting"
                  - "Credit reporting, credit repair services, or other personal consumer reports"
                  - "Debt collection"
                  - "Money transfer, virtual currency, or money service"
                  - "Money transfers"
                  - "Mortgage"
                  - "Other financial service"
                  - "Payday loan"
                  - "Payday loan, title loan, or personal loan"
                  - "Prepaid card"
                  - "Student loan"
                  - "Vehicle loan or lease"
                  - "Virtual currency"
              config:
                severity: warn
      - name: subproduct
        description: Product subcategory; ~7% null. Raw value from source — preserved for auditability.
      - name: product_normalized
        description: >
          product with legacy CFPB taxonomy merged into current labels. Eight old categories
          consolidated: Bank account or service → Checking or savings account; Consumer Loan →
          Vehicle loan or lease or Payday loan, title loan, or personal loan (by subproduct);
          Credit card → Credit card or prepaid card; Credit reporting → Credit reporting, credit
          repair services, or other personal consumer reports; Money transfers → Money transfer,
          virtual currency, or money service; Payday loan → Payday loan, title loan, or personal
          loan; Prepaid card → Credit card or prepaid card; Virtual currency → Money transfer,
          virtual currency, or money service. Unrecognized values pass through unchanged.
          not_null at severity: error — product is never null and the CASE has an ELSE branch,
          so a null here means broken logic.
        tests:
          - not_null
      - name: subproduct_normalized
        description: >
          subproduct with legacy labels merged into current equivalents, consistent with
          product_normalized. Key changes: Bank account or service subproduct label differences
          resolved; Consumer Loan vehicle subproducts renamed to Loan / Lease; legacy single-product
          null subproducts filled (Credit card → General-purpose credit card or charge card,
          Credit reporting → Credit reporting, Payday loan → Payday loan); Prepaid card
          subproducts mapped to Credit card or prepaid card equivalents; Debt collection
          old-style subproducts normalized (added "debt" suffix: Credit card → Credit card debt,
          Medical → Medical debt, etc.; Non-federal student loan → Private student loan debt).
          Unrecognized values pass through unchanged.
      - name: issue
        description: Top-level issue taxonomy (165 distinct values).
      - name: subissue
        description: Issue subcategory; ~20% null.

      - name: company_name
        description: >
          Free-text company name as submitted. 6,694 distinct values; parent
          corporations mixed with subsidiaries. Canonicalization happens
          downstream via crosswalk seed.
      - name: company_name_normalized
        description: >
          Derived from company_name: uppercased, internal whitespace collapsed
          to a single space, trailing period/comma/semicolon stripped. Used for
          grouping and crosswalk matching without altering the raw value.
      - name: state
        description: >
          2-char US state/territory/military code, uppercased. Null remapped to
          'not-provided'. "UNITED STATES MINOR OUTLYING ISLANDS" (305 rows) remapped
          to ISO code 'UM'. Any other long-form value remapped to 'not-provided' as a
          safety catch. Includes territories (PR, VI, GU, AS, MP, UM), military APO
          codes (AA, AE, AP), and freely associated states (FM, MH, PW).
          accepted_values at severity: error — values list confirmed against actual data
          (63 distinct raw values, all accounted for in the CASE expression or safety catch).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "AA"
                  - "AE"
                  - "AK"
                  - "AL"
                  - "AP"
                  - "AR"
                  - "AS"
                  - "AZ"
                  - "CA"
                  - "CO"
                  - "CT"
                  - "DC"
                  - "DE"
                  - "FL"
                  - "FM"
                  - "GA"
                  - "GU"
                  - "HI"
                  - "IA"
                  - "ID"
                  - "IL"
                  - "IN"
                  - "KS"
                  - "KY"
                  - "LA"
                  - "MA"
                  - "MD"
                  - "ME"
                  - "MH"
                  - "MI"
                  - "MN"
                  - "MO"
                  - "MP"
                  - "MS"
                  - "MT"
                  - "NC"
                  - "ND"
                  - "NE"
                  - "NH"
                  - "NJ"
                  - "NM"
                  - "NV"
                  - "NY"
                  - "OH"
                  - "OK"
                  - "OR"
                  - "PA"
                  - "PR"
                  - "PW"
                  - "RI"
                  - "SC"
                  - "SD"
                  - "TN"
                  - "TX"
                  - "UT"
                  - "VA"
                  - "VI"
                  - "VT"
                  - "WA"
                  - "WI"
                  - "WV"
                  - "WY"
                  - "UM"
                  - "not-provided"
              config:
                severity: error
      - name: zip_code
        description: >
          ZIP code as published by CFPB. Most complaints have a standard 5-digit ZIP.
          Exception: complaints where the consumer consented to narrative publication AND
          lives in a ZCTA with fewer than 20,000 people receive a 3-digit ZIP (CFPB
          privacy rule; Release 10, June 2015). Staging incorrectly LPADs these 3-digit
          values to 5-digit (e.g., raw "17.0" → "00017" instead of "017") — they are
          numeric and pass zip_code_is_valid, so the flag does NOT catch them. See
          docs/data-quality-notes.md § ZIP Code for impact and fix approach.
          No XXXXX masked values observed in this dataset.

      - name: tags
        description: >
          Special-population tag. 89% null. Three distinct non-null values:
          "Servicemember", "Older American", "Older American, Servicemember" (always
          Older American–first). Parse with LIKE '%Servicemember%' and
          LIKE '%Older American%' to handle the combined value correctly.
          CFPB definitions: Older American = submitter reports consumer age ≥ 62.
          Servicemember = active duty, National Guard, Reservist, Veteran, or retiree —
          AND spouses/dependents of servicemembers.
          Coverage: field added February 2016 (CFPB Release 11). Pre-2016 complaints
          (2012–2015 in our dataset) are structurally null — not a data quality issue.
          Use 2016 as the effective floor for any tags-based analysis.
      - name: tags_is_servicemember
        description: >
          TRUE if tags includes 'Servicemember'. Covers active duty, National Guard,
          Reservists, Veterans, retirees, and their spouses/dependents. FALSE for
          pre-Feb 2016 complaints (structurally null) and untagged complaints.
          Gate any analysis on date_received >= '2016-02-01'.
      - name: tags_is_older_american
        description: >
          TRUE if tags includes 'Older American' (age ≥ 62 as reported by submitter).
          FALSE for pre-Feb 2016 and untagged complaints. Same coverage floor as
          tags_is_servicemember.

      - name: zip_code_is_valid
        description: >
          TRUE if zip_code matches r'^\d{5}$' after staging cleanup. FALSE for null
          zips, non-numeric values, and 48 known corrupted zips. Note: CFPB intentional
          3-digit privacy zips incorrectly pass as TRUE after staging LPAD — see
          docs/data-quality-notes.md § ZIP Code.

      - name: submitted_via
        description: >
          Intake channel (Web, Phone, Referral, etc.). accepted_values at severity: warn
          — values list unverified. Promote to severity: error after running
          SELECT DISTINCT submitted_via.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "Email"
                  - "Fax"
                  - "Phone"
                  - "Postal mail"
                  - "Referral"
                  - "Web"
                  - "Web Referral"
              config:
                severity: warn
      - name: company_response_to_consumer
        description: >
          Resolution category returned by the company. 4 null rows mapped to
          'Untimely response' (assumption: no response filed = untimely).
          not_null at severity: error — nulls coalesced away in staging.
        tests:
          - not_null
      - name: company_public_response
        description: >
          Optional public statement from the company. Null (56%) mapped to 'not-provided'
          — sentinel chosen over NULL so GROUP BY includes a visible bucket without
          special COALESCE handling downstream. The verbose label "Company has responded
          to the consumer and the CFPB and chooses not to provide a public response"
          (1.3M rows) is collapsed to "Company chooses not to provide a public response"
          — the consumer response detail belongs in company_response_to_consumer, not here.
          not_null at severity: error — nulls mapped to 'not-provided' in staging.
        tests:
          - not_null
      - name: consumer_consent_provided
        description: >
          Whether the consumer consented to narrative publication. Null (25%) mapped
          to 'not-provided' — same sentinel pattern as company_public_response; keeps
          GROUP BY clean without downstream COALESCE. Values after staging: Consent
          provided, Consent not provided, Consent withdrawn, Other, not-provided.
          not_null at severity: error — nulls coalesced away in staging.
          Population timing: "Consent provided" and "Consent not provided" populate
          60 days after the complaint is sent to the company OR after the company files
          an optional public response, whichever comes first — explains why recent
          complaints have more nulls (window not yet elapsed at extract time). "N/A"
          populates immediately for pre-March 2015 complaints or cases where the
          narrative option was unavailable. "Other" means the complaint doesn't meet
          criteria for narrative publication.
        tests:
          - not_null

      - name: timely_response
        description: Whether the company responded within CFPB's SLA.
        tests:
          - not_null
      - name: consumer_disputed
        description: >
          Legacy field. CFPB stopped collecting mid-2017: 100% fill through 2016,
          29.8% in 2017, 0% from 2018 onward — 78% null overall. Gate any
          dispute-rate metric on date_received < '2017-01-01' to avoid comparing
          full-coverage years against empty ones.
      - name: has_narrative
        description: >
          Derived at raw materialization: TRUE if the source row had a non-empty
          consumer_complaint_narrative (text dropped to reduce table size 2.31 GB →
          768 MB). Zero before June 2015 — CFPB launched the opt-in narrative feature
          then. The 2015 rate (32.5%) reflects a partial year; treat 2016 as the
          effective floor for narrative analysis.
          not_null at severity: error — derived boolean, always TRUE or FALSE.
        tests:
          - not_null

  - name: stg_fdic_banks
    description: >
      Thin staging pass over `raw.fdic_active_banks_lean`. Renames
      `fdic_certificate_number` → `fdic_cert`; trims identity/name text;
      uppercases state. One row per active FDIC-insured institution.
    columns:
      - name: fdic_cert
        description: FDIC certificate number — natural primary key.
        tests:
          - not_null
          - unique

      - name: institution_name
        description: Operating bank legal name (e.g. "JPMorgan Chase Bank, National Association").
      - name: top_holder
        description: >
          Parent holding company name (e.g. "JPMORGAN CHASE & CO."). Primary
          bridge to CFPB `company_name` for bank-side complaint volume.
      - name: trade_name_1
        description: DBA / trade name if different from legal name.

      - name: state
        description: 2-char US state code; uppercased.
      - name: cfpb_supervisory_flag
        description: Whether institution is under CFPB supervision.
      - name: total_assets
        description: Total assets in USD. Sort key for size-based cohorts.
      - name: active
        description: Always TRUE in this table (source pre-filtered to active institutions).

  - name: stg_company_crosswalk
    description: >
      Typed staging pass over the company_crosswalk seed. raw_company_name is
      normalized identically to stg_cfpb_complaints.company_name_normalized
      (UPPER + collapsed whitespace + trailing punct stripped) so the join in
      int_complaints_with_company works on equal keys. One row per raw CFPB
      company name variant.
    columns:
      - name: raw_company_name
        description: >
          Normalized CFPB company name variant — join key to company_name_normalized
          in stg_cfpb_complaints. Same normalization expression applied to both sides.
        tests:
          - not_null
          - unique
      - name: canonical_name
        description: >
          Human-readable company name used as the grouping key in dim_company
          (e.g. "JPMorgan Chase", "Truist"). Multiple raw variants map to one
          canonical name; rebranded entities (SunTrust, BB&T) also map to Truist.
        tests:
          - not_null
      - name: category
        description: >
          Company type. Controls which downstream enrichments apply:
          only bank-category rows join to FDIC data.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - bank
                  - credit_bureau
                  - credit_union
                  - debt_collector
                  - mortgage_servicer
                  - student_loan_servicer
                  - fintech
                  - other
      - name: fdic_top_holder
        description: >
          Raw FDIC top_holder value used to join to int_fdic_banks_normalized.
          Null for non-bank categories and for bank entities with no FDIC record
          (e.g. foreign-parented subsidiaries). Pre-merger SunTrust and BB&T
          entries carry historically-correct values (SUNTRUST BANKS INC, BB&T CORP)
          but these no longer exist in the current FDIC active-institutions snapshot.
      - name: parent_as_of
        description: >
          Effective date of entity change for known rebrands. Null means the row
          represents a current (or historically stable) entity. Non-null rows:
          SunTrust → Truist (2019-12-01), BB&T → Truist (2019-12-01),
          Alliance Data → Bread Financial (2021-02-01). Used by the company_renames
          snapshot to surface SCD2 rebrand history.
