version: 2

sources:
  - name: raw
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: raw
    description: >
      Raw tables loaded outside dbt. CFPB materialized from the BigQuery
      public dataset `bigquery-public-data.cfpb_complaints.complaint_database`
      (frozen 2023-03-25, narrative column dropped). FDIC loaded from the
      FDIC BankFind active-institutions export.
    tables:
      - name: cfpb_complaints
        description: >
          CFPB Consumer Complaint Database, 2011-12 through 2023-03.
          3,458,906 rows. Narrative text dropped at materialize time
          (2.31 GB → 768 MB); replaced with boolean `has_narrative`.
        loaded_at_field: date_received
        freshness:
          warn_after: {count: 7, period: day}
          error_after: {count: 14, period: day}
          # Production SLA: CFPB releases updated data weekly. This source is frozen
          # at 2023-03-25 and will always fail freshness — expected on a static mirror.
        columns:
          - name: complaint_id
            description: Natural primary key.
            tests:
              - not_null
              - unique
          - name: product
            description: Top-level product taxonomy. 18 distinct values, 0% null.
          - name: subproduct
            description: Product subcategory. 76 distinct values, 6.8% null.
          - name: issue
            description: Top-level issue taxonomy. 165 distinct values, 0% null.
          - name: subissue
            description: Issue subcategory. 221 distinct values, 20.2% null.
          - name: company_name
            description: >
              Free-text company name as submitted. 6,694 distinct values.
              Mixes parent corporations and subsidiaries — normalization target downstream.
          - name: state
            description: 2-char US state/territory code. 63 distinct values, 1.2% null.
          - name: tags
            description: Special-population tag (Older American, Servicemember, or both). 3 distinct values, 88.9% null.
          - name: company_response_to_consumer
            description: 8 distinct values, <0.1% null.
          - name: company_public_response
            description: Optional public statement from the company. 11 distinct values, 55.6% null.
          - name: consumer_disputed
            description: Legacy field — CFPB stopped collecting ~2017. 77.8% null.
          - name: consumer_consent_provided
            description: 4 distinct values, 25.2% null.
          - name: has_narrative
            description: >
              Derived at raw materialize time. TRUE if the source row had a
              non-empty `consumer_complaint_narrative`; the text itself was dropped.

      - name: fdic_active_banks_lean
        description: >
          Active FDIC-insured institutions, trimmed from 117 to 95 columns.
          All rows have `active = TRUE`. 4,756 rows.
        loaded_at_field: repdte
        freshness:
          warn_after: {count: 90, period: day}
          error_after: {count: 120, period: day}
          # Production SLA: FDIC publishes quarterly updates. This source is a
          # static export and will always fail freshness — expected on a static mirror.
        columns:
          # Identity & ownership
          - name: fdic_certificate_number
            description: FDIC certificate number — natural primary key.
            tests:
              - not_null
              - unique
          - name: institution_name
            description: Operating bank legal name (e.g. "JPMorgan Chase Bank, National Association").
          - name: trade_name_1
            description: DBA (doing-business-as) name, if different from institution_name.
          - name: fdic_id
            description: '-'
          - name: rssd_id
            description: Federal Reserve RSSD identifier.
          - name: ultimate_cert_number
            description: '-'
          - name: parent_parcert
            description: '-'

          # Status flags
          - name: active
            description: All rows TRUE in this table (source is pre-filtered to active institutions).
          - name: conservatorship
            description: '-'
          - name: denovo_institute
            description: '-'

          # Location
          - name: address
            description: '-'
          - name: city
            description: '-'
          - name: state
            description: 2-char US state/territory code.
          - name: state_name
            description: '-'
          - name: state_fips_code
            description: '-'
          - name: zip_code
            description: '-'
          - name: county_name
            description: '-'
          - name: county_fips_code
            description: '-'
          - name: cbsa_name
            description: Core-Based Statistical Area name.
          - name: cbsa_fips_code
            description: '-'
          - name: cbsa_metro_flag
            description: '-'
          - name: cbsa_micro_flag
            description: '-'
          - name: cbsa_division_name
            description: '-'
          - name: cbsa_division_fips_code
            description: '-'
          - name: cbsa_division_flag
            description: '-'
          - name: csa_name
            description: Combined Statistical Area name.
          - name: csa_fips_code
            description: '-'
          - name: csa_indicator
            description: '-'

          # Charter & regulator
          - name: bank_charter_class
            description: '-'
          - name: chartering_agency
            description: '-'
          - name: federal_charter
            description: '-'
          - name: state_chartered
            description: '-'
          - name: occ_charter
            description: '-'
          - name: occ_district
            description: '-'
          - name: regulator
            description: '-'
          - name: category_code
            description: '-'
          - name: ots_region
            description: OTS region. Known "West" vs "Western" inconsistency in source — normalize in staging.
          - name: qbp_region
            description: '-'
          - name: fdic_geo_region
            description: '-'
          - name: fdic_supervisory_region
            description: '-'
          - name: fdic_supervisory_region_code
            description: '-'
          - name: fdic_field_office
            description: '-'
          - name: fed_reserve_district
            description: '-'
          - name: fed_reserve_district_id
            description: '-'
          - name: fed_reserve_unique_id
            description: '-'
          - name: docket
            description: '-'

          # CFPB supervisory scope
          - name: cfpb_supervisory_flag
            description: Whether the institution is under CFPB supervision.
          - name: cfpb_supervisory_start_date
            description: Mostly 2011-07-21 for large banks (CFPB's original supervisory roster).
          - name: cfpb_supervisory_end_date
            description: '-'

          # Insurance
          - name: fdic_insured
            description: '-'
          - name: deposit_insurance_date
            description: '-'
          - name: deposit_insurance_fund_member
            description: '-'
          - name: bank_insurance_fund_member
            description: '-'
          - name: insurance_fund_membership
            description: '-'
          - name: secondary_insurance_fund
            description: '-'
          - name: insured_commercial_bank
            description: '-'
          - name: insured_savings_institute
            description: '-'

          # Holding company
          - name: holding_company_flag
            description: '-'
          - name: holding_company_state
            description: '-'
          - name: high_holder_city
            description: '-'
          - name: top_holder
            description: >
              Parent holding company name (e.g. "JPMORGAN CHASE & CO.").
              Primary bridge to CFPB `company_name` for bank-side complaint joins.
          - name: ownership_type
            description: '-'
          - name: subchap_s_indicator
            description: Subchapter S corporation tax status flag.

          # Business characteristics
          - name: primary_specialization
            description: FDIC specialization category (e.g. commercial lending, credit card, agricultural).
          - name: asset_concentration_hierarchy
            description: '-'
          - name: credit_card_institution
            description: '-'
          - name: ag_lending_flag
            description: Agricultural lending concentration flag.
          - name: trust_powers_status
            description: '-'
          - name: iba
            description: International Banking Act designation flag.
          - name: ffiec_call_report_filer
            description: '-'
          - name: law_sasser
            description: '-'

          # Financials
          - name: total_assets
            description: Total assets in USD. Primary sort key for size-based analysis.
          - name: total_deposits
            description: '-'
          - name: total_domestic_deposits
            description: '-'
          - name: equity_capital
            description: '-'
          - name: net_income
            description: '-'
          - name: quarterly_net_income
            description: '-'
          - name: return_on_assets
            description: Annualized ROA (percent).
          - name: roa_quarterly
            description: '-'
          - name: roa_pretax
            description: '-'
          - name: row_pretax_quarterly
            description: Pre-tax quarterly return on equity. Column name is a source typo (row_ should be roe_).
          - name: return_on_equity
            description: Annualized ROE (percent).
          - name: roe_quarterly
            description: '-'

          # Offices & dates
          - name: offices_count
            description: Total office/branch count (domestic + foreign + territories).
          - name: office_count_domestic
            description: '-'
          - name: office_count_foreign
            description: '-'
          - name: office_count_us_territories
            description: '-'
          - name: established_date
            description: '-'
          - name: last_structural_change
            description: '-'
          - name: effective_date
            description: '-'
          - name: end_effective_date
            description: '-'
          - name: report_date
            description: '-'
          - name: reporting_period_end_date
            description: '-'
          - name: last_updated
            description: '-'
          - name: run_date
            description: '-'
